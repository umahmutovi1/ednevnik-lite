# sonar-project.properties — eDnevnik-Lite SonarQube Configuration

sonar.projectKey=ednevnik-lite
sonar.projectName=eDnevnik-Lite
sonar.projectVersion=2.0

sonar.host.url=https://sonarcloud.io
sonar.organization=umahmutovi1

# Source and language
sonar.sources=app
sonar.python.version=3.12
sonar.language=py

# Exclusions — prevent false positives from venv, migrations, and test fixtures
sonar.exclusions=venv/**,.venv/**,migrations/**,tests/**,**/__pycache__/**

# Test coverage — generated by: pytest --cov=app --cov-report=xml
sonar.python.coverage.reportPaths=coverage.xml

